<!-- The Frontend Dashboard Dashboard -->

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intrusion Detection Dashboard</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background-color:#f5f7fa;
        }

        .header-card{
            background:#212529;
            color:white;
            padding:20px;
            border-radius:10px;
        }

        .alert-card{
            transition:0.3s;
        }

        .alert-card:hover{
            transform:scale(1.01);
        }

        .snapshot-image{
            width:100%;
            height:250px;
            object-fit:cover;
        }

        .confidence-badge{
            font-size:14px;
        }

    </style>

</head>

<body>

<div class="container mt-4">

    <!-- Header -->

    <div class="header-card mb-4">
        <h2>🚨 Intrusion Detection System Dashboard</h2>
        <p class="mb-0">
            Real-Time Security Monitoring & Alert Management
        </p>
    </div>

    <!-- Summary Cards -->

    <div class="row mb-4">

        <div class="col-md-4">
            <div class="card shadow-sm">
                <div class="card-body text-center">
                    <h5>Total Alerts</h5>
                    <h2 id="total-alerts">0</h2>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow-sm">
                <div class="card-body text-center">
                    <h5>System Status</h5>
                    <h2 class="text-success">
                        ONLINE
                    </h2>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow-sm">
                <div class="card-body text-center">
                    <h5>Database</h5>
                    <h2 class="text-primary">
                        CONNECTED
                    </h2>
                </div>
            </div>
        </div>

    </div>

    <!-- Alert Section -->

    <div class="d-flex justify-content-between align-items-center mb-3">

        <h3>Recent Intrusion Alerts</h3>

        <button
            class="btn btn-primary"
            onclick="loadAlerts()">
            Refresh
        </button>

    </div>

    <div class="row" id="alert-container">

    </div>

</div>

<script>

function resolveSnapshotUrl(snapshotPath){

    if(!snapshotPath){

        return "";

    }

    const normalizedPath = snapshotPath.replace(/\\/g, "/");

    if(normalizedPath.startsWith("http://") || normalizedPath.startsWith("https://")){

        return normalizedPath;

    }

    const staticIndex = normalizedPath.indexOf("static/");

    if(staticIndex !== -1){

        return "/" + normalizedPath.slice(staticIndex);

    }

    if(normalizedPath.startsWith("/")){

        return normalizedPath;

    }

    return "/" + normalizedPath.replace(/^\/+/, "");

}

async function loadAlerts(){

    try{

        const response = await fetch('/api/alerts');

        const data = await response.json();

        const container =
            document.getElementById(
                "alert-container"
            );

        container.innerHTML = "";

        if(!response.ok){

            throw new Error(
                data.error ||
                "Failed to fetch alerts."
            );

        }

        if(!data.success){

            container.innerHTML = `
                <div class="alert alert-danger">
                    ${data.error || "Failed to load alerts."}
                </div>
            `;

            return;
        }

        document.getElementById(
            "total-alerts"
        ).innerText = data.alerts.length;

        if(data.alerts.length === 0){

            container.innerHTML = `
                <div class="alert alert-info">
                    No intrusion events detected.
                </div>
            `;

            return;
        }

        data.alerts.forEach(alert => {

            const snapshotUrl = resolveSnapshotUrl(
                alert.snapshot_path
            );

            const card = `
                <div class="col-lg-4 col-md-6 mb-4">

                    <div class="card shadow alert-card">

                        <img
                            src="${snapshotUrl}"
                            onerror="this.src='https://via.placeholder.com/640x360?text=Snapshot+Unavailable';"
                            class="snapshot-image"
                            alt="Snapshot">

                        <div class="card-body">

                            <h5 class="card-title">
                                Alert #${alert.id}
                            </h5>

                            <p>
                                <strong>Location:</strong>
                                ${alert.location}
                            </p>

                            <p>
                                <strong>Time:</strong>
                                ${alert.timestamp}
                            </p>

                            <span
                                class="
                                badge
                                bg-danger
                                confidence-badge">

                                Confidence:
                                ${alert.confidence}%

                            </span>

                        </div>

                    </div>

                </div>
            `;

            container.innerHTML += card;

        });

    }
    catch(error){

        console.error(error);

        document.getElementById(
            "alert-container"
        ).innerHTML = `
            <div class="alert alert-danger">
                Unable to load alerts right now.
            </div>
        `;

    }

}

loadAlerts();

setInterval(
    loadAlerts,
    10000
);

</script>

</body>
</html>
